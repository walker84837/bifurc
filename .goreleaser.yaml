version: 2
before:
  hooks:
    - go mod tidy
builds:
  - binary: bifurc
    goos: [linux, darwin, windows]
    goarch: [amd64, arm64]
    ldflags: -s -w
archives:
  - formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
checksum:
  name_template: checksums.txt
changelog:
  sort: desc
